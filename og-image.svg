<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13151c"/>
      <stop offset="100%" stop-color="#0e1018"/>
    </linearGradient>
    <linearGradient id="saffron-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <!-- Indian flag tricolor accent -->
    <linearGradient id="tricolor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="33%" stop-color="#f97316"/>
      <stop offset="33.1%" stop-color="#f8f5ed"/>
      <stop offset="66%" stop-color="#f8f5ed"/>
      <stop offset="66.1%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow -->
  <rect x="0" y="0" width="500" height="630" fill="url(#saffron-glow)"/>

  <!-- Tricolor accent strip -->
  <rect x="60" y="60" width="120" height="3" rx="1.5" fill="url(#tricolor)"/>

  <!-- Brand mark -->
  <rect x="60" y="88" width="48" height="48" rx="9" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>
  <text x="84" y="119" font-family="serif" font-size="22" fill="#f97316" text-anchor="middle" opacity="0.9">₹</text>

  <!-- India Economy label -->
  <text x="124" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#9ca3af" letter-spacing="0.08em" text-transform="uppercase">INDIA ECONOMY</text>
  <text x="124" y="127" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#6b7280">Dashboard · 2026</text>

  <!-- Main headline -->
  <text x="60" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="62" fill="#f8f5ed" font-weight="400" letter-spacing="-0.02em">India's household</text>
  <text x="60" y="355" font-family="Georgia, 'Times New Roman', serif" font-size="62" fill="#f97316" font-weight="400" font-style="italic">economy,</text>
  <text x="60" y="430" font-family="Georgia, 'Times New Roman', serif" font-size="62" fill="#f8f5ed" font-weight="400">made explorable.</text>

  <!-- Descriptor -->
  <text x="60" y="510" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#6b7280">Open data on wealth, work, health, learning and financial</text>
  <text x="60" y="534" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#6b7280">inclusion across all 37 Indian states — HCES · PLFS · NFHS-5</text>

  <!-- Right side stats decoration -->
  <g opacity="0.4">
    <rect x="920" y="180" width="220" height="1" fill="#374151"/>
    <text x="920" y="220" font-family="-apple-system, sans-serif" font-size="42" fill="#f97316" font-weight="700">37</text>
    <text x="920" y="246" font-family="-apple-system, sans-serif" font-size="13" fill="#9ca3af">States &amp; UTs</text>

    <rect x="920" y="290" width="220" height="1" fill="#374151"/>
    <text x="920" y="330" font-family="-apple-system, sans-serif" font-size="42" fill="#f97316" font-weight="700">22</text>
    <text x="920" y="356" font-family="-apple-system, sans-serif" font-size="13" fill="#9ca3af">Indicators tracked</text>

    <rect x="920" y="400" width="220" height="1" fill="#374151"/>
    <text x="920" y="440" font-family="-apple-system, sans-serif" font-size="42" fill="#f97316" font-weight="700">5+</text>
    <text x="920" y="466" font-family="-apple-system, sans-serif" font-size="13" fill="#9ca3af">Data sources</text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#tricolor)"/>
</svg>
